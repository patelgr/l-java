name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]

permissions:
  checks: write

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and verify
        run: ./gradlew check build

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

      - name: Dependency updates (advisory only)
        run: ./gradlew dependencyUpdates -Drevision=release --no-daemon
        continue-on-error: true

  qodana:
    name: Qodana
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Linter (qodana-jvm-community, free) and the ERROR-tier gate both come from
      # qodana.yaml + .idea/inspectionProfiles/LJava.xml — don't duplicate thresholds here.
      # No QODANA_TOKEN: this runs without Qodana Cloud upload; results go to GitHub code
      # scanning via the SARIF upload step below instead.
      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json
